<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>地球儀アプリ</title>
  <style>
    :root {
      --panel-bg: rgba(15, 23, 42, 0.75);
      --accent: #38bdf8;
      --text: #e2e8f0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      color: var(--text);
    }
    #app { position: fixed; inset: 0; }
    canvas { display: block; }

    .panel {
      position: fixed;
      top: 16px;
      left: 16px;
      padding: 16px 18px;
      background: var(--panel-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 14px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      max-width: 260px;
      user-select: none;
    }
    .panel h1 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .panel h1 .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent);
    }
    .panel p.sub { font-size: 12px; color: #94a3b8; margin-bottom: 14px; }

    .row { display: flex; align-items: center; justify-content: space-between; margin: 10px 0; font-size: 13px; }
    .row label { color: #cbd5e1; }

    input[type="range"] {
      -webkit-appearance: none; appearance: none;
      width: 120px; height: 4px; border-radius: 4px;
      background: rgba(148, 163, 184, 0.3); outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--accent); cursor: pointer;
      box-shadow: 0 0 8px var(--accent);
    }

    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 6px 12px; border-radius: 8px; cursor: pointer;
      background: rgba(56, 189, 248, 0.15);
      border: 1px solid rgba(56, 189, 248, 0.4);
      color: var(--accent); font-size: 12px; font-weight: 600;
      transition: background 0.15s;
    }
    .btn:hover { background: rgba(56, 189, 248, 0.3); }
    .btn.active { background: var(--accent); color: #0f172a; }

    .toggle-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }

    .hint {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      font-size: 12px; color: #64748b; background: rgba(15, 23, 42, 0.6);
      padding: 6px 14px; border-radius: 20px; backdrop-filter: blur(8px);
      user-select: none;
    }
    .loading {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 12px; background: #000; z-index: 10;
      transition: opacity 0.6s; font-size: 14px; color: #94a3b8;
    }
    .loading.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 36px; height: 36px; border: 3px solid rgba(56, 189, 248, 0.2);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* --- AR mode --- */
    #cam {
      position: fixed; inset: 0; width: 100%; height: 100%;
      object-fit: cover; z-index: 0; display: none; background: #000;
    }
    body.ar-active #cam { display: block; }
    body.ar-active .panel,
    body.ar-active .hint { display: none; }

    .ar-btn {
      width: 100%; margin-top: 12px; padding: 10px;
      font-size: 13px; font-weight: 700;
      background: rgba(56, 189, 248, 0.18);
      border: 1px solid rgba(56, 189, 248, 0.5);
    }

    #ar-ui { position: fixed; inset: 0; z-index: 5; display: none; pointer-events: none; }
    body.ar-active #ar-ui { display: block; }

    #ar-top {
      position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
      width: calc(100% - 28px); max-width: 460px;
      background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(10px);
      border: 1px solid rgba(148, 163, 184, 0.25); border-radius: 12px;
      padding: 10px 14px; font-size: 13px; line-height: 1.5; text-align: center;
    }
    #ar-top b { color: var(--accent); }

    #ar-reticle {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-size: 13px; color: #e2e8f0; text-align: center;
      background: rgba(15, 23, 42, 0.55); padding: 8px 16px; border-radius: 20px;
      backdrop-filter: blur(8px); transition: opacity 0.3s;
    }

    #ar-reveal {
      position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
      width: calc(100% - 28px); max-width: 420px;
      background: rgba(15, 23, 42, 0.82); backdrop-filter: blur(14px);
      border: 1px solid rgba(56, 189, 248, 0.5); border-radius: 16px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
      padding: 18px 20px; text-align: center;
      opacity: 0; transition: opacity 0.4s, transform 0.4s; pointer-events: none;
    }
    #ar-reveal.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #ar-reveal .big { font-size: 26px; font-weight: 800; margin: 4px 0; }
    #ar-reveal .lbl { font-size: 12px; color: #94a3b8; }
    #ar-reveal .dist { font-size: 12px; color: var(--accent); margin-top: 6px; }

    #ar-exit {
      position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
      pointer-events: auto;
    }
    #ar-error {
      position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
      width: calc(100% - 28px); max-width: 420px;
      background: rgba(127, 29, 29, 0.85); border: 1px solid #ef4444;
      border-radius: 12px; padding: 12px 16px; font-size: 13px; text-align: center;
      display: none;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div>地球儀を読み込み中…</div>
  </div>

  <div class="panel">
    <h1><span class="dot"></span>地球儀アプリ</h1>
    <p class="sub">ドラッグで回転・ホイールでズーム</p>

    <div class="row">
      <label>自動回転</label>
      <input type="range" id="speed" min="0" max="100" value="20" />
    </div>

    <div class="toggle-row">
      <div class="btn active" id="toggle-clouds">☁️ 雲</div>
      <div class="btn active" id="toggle-stars">✨ 星空</div>
      <div class="btn" id="reset">↺ 視点リセット</div>
    </div>

    <div class="btn ar-btn" id="enter-ar">🛰️ ARで地球の裏側を見る</div>
  </div>

  <div class="hint">マウスドラッグで回転 · スクロールでズーム</div>

  <!-- AR camera feed + overlay -->
  <video id="cam" autoplay muted playsinline></video>
  <div id="ar-ui">
    <div id="ar-top">位置情報を取得中…</div>
    <div id="ar-reticle">📷 足元の地面にカメラを向けてみて</div>
    <div id="ar-reveal">
      <div class="lbl">🌍 真下、地球の裏側は…</div>
      <div class="big" id="ar-country">—</div>
      <div class="dist" id="ar-dist"></div>
    </div>
    <div id="ar-error"></div>
    <div class="btn" id="ar-exit">✕ ARを終了</div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const app = document.getElementById('app');
    const loading = document.getElementById('loading');

    // --- Scene setup ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 7);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x000000, 0); // transparent so the AR camera feed shows through
    app.appendChild(renderer.domElement);

    // --- Lighting ---
    const sunLight = new THREE.DirectionalLight(0xffffff, 1.6);
    sunLight.position.set(5, 3, 5);
    scene.add(sunLight);
    scene.add(new THREE.AmbientLight(0x334155, 1.2));

    // --- Texture loader ---
    const loader = new THREE.TextureLoader();
    loader.crossOrigin = 'anonymous';
    const TEX = 'https://unpkg.com/three-globe@2.31.0/example/img/';

    const earthGroup = new THREE.Group();
    scene.add(earthGroup);

    // Earth sphere
    const earthGeo = new THREE.SphereGeometry(2, 64, 64);
    const earthMat = new THREE.MeshPhongMaterial({
      map: loader.load(TEX + 'earth-blue-marble.jpg', () => loading.classList.add('hidden')),
      bumpMap: loader.load(TEX + 'earth-topology.png'),
      bumpScale: 0.04,
      specularMap: loader.load(TEX + 'earth-water.png'),
      specular: new THREE.Color(0x334155),
      shininess: 12,
    });
    const earth = new THREE.Mesh(earthGeo, earthMat);
    earthGroup.add(earth);

    // Clouds
    const cloudGeo = new THREE.SphereGeometry(2.03, 64, 64);
    const cloudMat = new THREE.MeshPhongMaterial({
      map: loader.load(TEX + 'earth-clouds.png'),
      transparent: true,
      opacity: 0.4,
      depthWrite: false,
    });
    const clouds = new THREE.Mesh(cloudGeo, cloudMat);
    earthGroup.add(clouds);

    // Atmosphere glow
    const atmGeo = new THREE.SphereGeometry(2.15, 64, 64);
    const atmMat = new THREE.ShaderMaterial({
      transparent: true,
      side: THREE.BackSide,
      uniforms: { glowColor: { value: new THREE.Color(0x38bdf8) } },
      vertexShader: `
        varying vec3 vNormal;
        void main() {
          vNormal = normalize(normalMatrix * normal);
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }`,
      fragmentShader: `
        varying vec3 vNormal;
        uniform vec3 glowColor;
        void main() {
          float intensity = pow(0.62 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 3.0);
          gl_FragColor = vec4(glowColor, 1.0) * intensity;
        }`,
    });
    const atmosphere = new THREE.Mesh(atmGeo, atmMat);
    earthGroup.add(atmosphere);

    // Tilt the earth axis
    earthGroup.rotation.z = THREE.MathUtils.degToRad(23.5);

    // --- Starfield ---
    function makeStars() {
      const count = 4000;
      const positions = new Float32Array(count * 3);
      for (let i = 0; i < count; i++) {
        const r = 90 + Math.random() * 60;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
        positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
        positions[i * 3 + 2] = r * Math.cos(phi);
      }
      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      const mat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.7, sizeAttenuation: true });
      return new THREE.Points(geo, mat);
    }
    const stars = makeStars();
    scene.add(stars);

    // --- Controls ---
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.rotateSpeed = 0.5;
    controls.minDistance = 3;
    controls.maxDistance = 20;
    controls.enablePan = false;

    // --- UI ---
    let autoSpeed = 0.2;
    const speedSlider = document.getElementById('speed');
    speedSlider.addEventListener('input', e => { autoSpeed = e.target.value / 100; });

    const toggleClouds = document.getElementById('toggle-clouds');
    toggleClouds.addEventListener('click', () => {
      clouds.visible = !clouds.visible;
      toggleClouds.classList.toggle('active', clouds.visible);
    });

    const toggleStars = document.getElementById('toggle-stars');
    toggleStars.addEventListener('click', () => {
      stars.visible = !stars.visible;
      toggleStars.classList.toggle('active', stars.visible);
    });

    document.getElementById('reset').addEventListener('click', () => {
      camera.position.set(0, 0, 7);
      controls.target.set(0, 0, 0);
    });

    // --- Animation loop ---
    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      const dt = clock.getDelta();
      if (AR.active) {
        AR.update();
      } else {
        earthGroup.rotation.y += autoSpeed * dt;
        clouds.rotation.y += autoSpeed * dt * 0.15;
        stars.rotation.y += 0.005 * dt;
        controls.update();
      }
      renderer.render(scene, camera);
    }

    /* =====================================================================
       AR MODE — point your phone at the ground to "see through" the Earth
       to the antipode (the point on the exact opposite side of the planet).
       ===================================================================== */
    const AR = (() => {
      const el = {
        enter: document.getElementById('enter-ar'),
        exit: document.getElementById('ar-exit'),
        video: document.getElementById('cam'),
        top: document.getElementById('ar-top'),
        reticle: document.getElementById('ar-reticle'),
        reveal: document.getElementById('ar-reveal'),
        country: document.getElementById('ar-country'),
        dist: document.getElementById('ar-dist'),
        error: document.getElementById('ar-error'),
      };

      let active = false;
      let stream = null;
      let arGlobe = null;
      let orient = null;             // latest {alpha, beta, gamma} in radians
      const savedCam = new THREE.Vector3();

      // lat/lng (degrees) -> position on a sphere of radius r, aligned with
      // the equirectangular earth texture used by the main globe.
      function latLngToVec3(lat, lng, r) {
        const phi = (90 - lat) * Math.PI / 180;
        const theta = (lng + 180) * Math.PI / 180;
        return new THREE.Vector3(
          -r * Math.sin(phi) * Math.cos(theta),
          r * Math.cos(phi),
          r * Math.sin(phi) * Math.sin(theta)
        );
      }

      function makePin(color) {
        const m = new THREE.MeshBasicMaterial({ color, depthTest: false });
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.09, 16, 16), m);
        head.renderOrder = 10;
        return head;
      }

      function makeLabel(text) {
        const c = document.createElement('canvas');
        c.width = 512; c.height = 128;
        const ctx = c.getContext('2d');
        ctx.fillStyle = 'rgba(15,23,42,0.85)';
        roundRect(ctx, 6, 30, 500, 68, 16); ctx.fill();
        ctx.strokeStyle = '#38bdf8'; ctx.lineWidth = 3;
        roundRect(ctx, 6, 30, 500, 68, 16); ctx.stroke();
        ctx.fillStyle = '#e2e8f0';
        ctx.font = 'bold 44px -apple-system, "Hiragino Sans", sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(text, 256, 66);
        const tex = new THREE.CanvasTexture(c);
        const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, depthTest: false, transparent: true }));
        sp.renderOrder = 11;
        sp.scale.set(2.4, 0.6, 1);
        return sp;
      }
      function roundRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + w, y, x + w, y + h, r);
        ctx.arcTo(x + w, y + h, x, y + h, r);
        ctx.arcTo(x, y + h, x, y, r);
        ctx.arcTo(x, y, x + w, y, r);
        ctx.closePath();
      }

      // Build the translucent "see-through" globe placed below the viewer.
      function buildGlobe(lat, lng, antiLat, antiLng, countryText) {
        if (arGlobe) { scene.remove(arGlobe); }
        arGlobe = new THREE.Group();
        const R = 1.6;

        const mesh = new THREE.Mesh(
          new THREE.SphereGeometry(R, 48, 48),
          new THREE.MeshPhongMaterial({
            map: earthMat.map, transparent: true, opacity: 0.55, depthWrite: false,
          })
        );
        arGlobe.add(mesh);

        // green pin = where you are now (ends up on top, nearest the viewer)
        const here = makePin(0x4ade80);
        here.position.copy(latLngToVec3(lat, lng, R));
        arGlobe.add(here);

        // red pin = the antipode, on the far side, seen THROUGH the globe
        const there = makePin(0xf87171);
        there.position.copy(latLngToVec3(antiLat, antiLng, R));
        arGlobe.add(there);

        const label = makeLabel(countryText);
        label.position.copy(latLngToVec3(antiLat, antiLng, R + 0.45));
        arGlobe.add(label);

        // rotate so your current location points straight up toward the camera
        const up = latLngToVec3(lat, lng, 1).normalize();
        arGlobe.quaternion.setFromUnitVectors(up, new THREE.Vector3(0, 1, 0));
        arGlobe.position.set(0, -3.0, 0);
        arGlobe.visible = true;
        scene.add(arGlobe);
      }

      // ---- Device orientation -> camera quaternion (standard formula) ----
      const _zee = new THREE.Vector3(0, 0, 1);
      const _euler = new THREE.Euler();
      const _q0 = new THREE.Quaternion();
      const _q1 = new THREE.Quaternion(-Math.sqrt(0.5), 0, 0, Math.sqrt(0.5));
      const _fwd = new THREE.Vector3();

      function applyOrientation() {
        if (!orient) return;
        const screenAngle = ((screen.orientation && screen.orientation.angle) || window.orientation || 0) * Math.PI / 180;
        _euler.set(orient.beta, orient.alpha, -orient.gamma, 'YXZ');
        camera.quaternion.setFromEuler(_euler);
        camera.quaternion.multiply(_q1);
        camera.quaternion.multiply(_q0.setFromAxisAngle(_zee, -screenAngle));
      }

      function update() {
        applyOrientation();
        if (arGlobe) arGlobe.rotation.y += 0.0; // keep geography stable
        // Are we looking down toward the ground?
        _fwd.set(0, 0, -1).applyQuaternion(camera.quaternion);
        const lookingDown = _fwd.y < -0.35;
        el.reveal.classList.toggle('show', lookingDown);
        el.reticle.style.opacity = lookingDown ? '0' : '1';
      }

      function onOrient(e) {
        if (e.alpha == null) return;
        orient = {
          alpha: THREE.MathUtils.degToRad(e.alpha),
          beta: THREE.MathUtils.degToRad(e.beta),
          gamma: THREE.MathUtils.degToRad(e.gamma),
        };
      }

      // ---- Reverse geocoding (no API key, client-side) ----
      async function lookupPlace(lat, lng) {
        try {
          const url = `https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lng}&localityLanguage=ja`;
          const r = await fetch(url);
          const j = await r.json();
          if (j.countryName) {
            return (j.countryName) + (j.principalSubdivision ? ` · ${j.principalSubdivision}` : '');
          }
          // antipode is often open ocean -> show nearest sea / continent if known
          const sea = (j.localityInfo && j.localityInfo.informative || [])
            .map(x => x.name).find(n => /(Ocean|Sea|海|洋)/i.test(n));
          return sea ? `${sea}（海上）` : '海の上';
        } catch (err) {
          return null;
        }
      }

      function showError(msg) {
        el.error.textContent = msg;
        el.error.style.display = 'block';
      }

      async function enter() {
        // 1) camera permission must come from this user gesture
        try {
          stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: { ideal: 'environment' } }, audio: false,
          });
          el.video.srcObject = stream;
        } catch (err) {
          alert('カメラを使えませんでした。HTTPS（GitHub Pages等）で開き、カメラ許可をオンにしてください。\n' + err.message);
          return;
        }

        // 2) iOS 13+ needs explicit permission for motion/orientation
        try {
          if (typeof DeviceOrientationEvent !== 'undefined' &&
              typeof DeviceOrientationEvent.requestPermission === 'function') {
            const res = await DeviceOrientationEvent.requestPermission();
            if (res !== 'granted') showError('方位センサーが許可されませんでした。映像は出ますが向きの連動はしません。');
          }
        } catch (_) {}
        window.addEventListener('deviceorientation', onOrient, true);

        // 3) enter AR rendering state
        active = true; AR.active = true;
        document.body.classList.add('ar-active');
        el.error.style.display = 'none';
        controls.enabled = false;
        savedCam.copy(camera.position);
        camera.position.set(0, 0, 0);
        camera.fov = 75; camera.updateProjectionMatrix();
        earthGroup.visible = false;
        stars.visible = false;

        // 4) geolocation -> antipode -> place names
        el.top.innerHTML = '位置情報を取得中…';
        navigator.geolocation.getCurrentPosition(async (pos) => {
          const lat = pos.coords.latitude, lng = pos.coords.longitude;
          const antiLat = -lat;
          const antiLng = lng > 0 ? lng - 180 : lng + 180;

          buildGlobe(lat, lng, antiLat, antiLng, '…');
          const [here, there] = await Promise.all([
            lookupPlace(lat, lng), lookupPlace(antiLat, antiLng),
          ]);
          const hereTxt = here || `${lat.toFixed(1)}, ${lng.toFixed(1)}`;
          const thereTxt = there || `${antiLat.toFixed(1)}, ${antiLng.toFixed(1)}`;
          el.top.innerHTML = `📍 現在地: <b>${hereTxt}</b><br>🌏 地球の裏側: <b>${thereTxt}</b>`;
          el.country.textContent = thereTxt;
          el.dist.textContent = '🌍 地球を貫いて約 12,742 km 先';
          buildGlobe(lat, lng, antiLat, antiLng, thereTxt);
        }, (err) => {
          showError('位置情報を取得できませんでした（' + err.message + '）。許可を確認してください。');
          el.top.innerHTML = '位置情報が取得できませんでした';
        }, { enableHighAccuracy: true, timeout: 10000 });
      }

      function exit() {
        active = false; AR.active = false;
        document.body.classList.remove('ar-active');
        window.removeEventListener('deviceorientation', onOrient, true);
        if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
        el.video.srcObject = null;
        if (arGlobe) { scene.remove(arGlobe); arGlobe = null; }
        el.reveal.classList.remove('show');
        // restore normal globe view
        controls.enabled = true;
        camera.position.copy(savedCam.lengthSq() ? savedCam : new THREE.Vector3(0, 0, 7));
        camera.quaternion.set(0, 0, 0, 1);
        camera.fov = 45; camera.updateProjectionMatrix();
        controls.target.set(0, 0, 0);
        earthGroup.visible = true;
        stars.visible = document.getElementById('toggle-stars').classList.contains('active');
      }

      el.enter.addEventListener('click', enter);
      el.exit.addEventListener('click', exit);

      return { get active() { return active; }, set active(v) { active = v; }, update };
    })();

    // start the render loop now that AR is defined
    animate();

    // --- Resize ---
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Fallback: hide loader after 6s even if texture is slow
    setTimeout(() => loading.classList.add('hidden'), 6000);
  </script>
</body>
</html>
